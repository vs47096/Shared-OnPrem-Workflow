name: Shared On-Prem Deployment Template

on:
  workflow_call:
    # Directly defining the required infrastructure secrets inside the template
    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKER_PAT:
        required: true
      DOCKER_REPOSITORY_NAME:
        required: true
      ONPREM_SERVER_SSH_HOST:
        required: true
      ONPREM_SERVER_SSH_PORT:
        required: true
      ONPREM_SERVER_USER_ADMIN:
        required: true
      ONPREM_SERVER_DB_USERNAME:
        required: true
      ONPREM_SERVER_DB_PASSWORD:
        required: true
      ONPREM_SERVER_DB_HOST:
        required: true
      APP_JWT_SECRET:
        required: true
      ONPREM_SERVER_SSH_PRIVATE_KEY:
        required: true

jobs:
  # ==============================================================================
  # BUILD JOB
  # ==============================================================================
  build:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'prod' || 'test' }}
    env:
      FINAL_PROFILE: ${{ github.ref_name == 'main' && 'prod' || 'test' }}
    outputs:
      project_name: ${{ steps.get_project.outputs.project_name }}

    steps:
      - name: 'Checkout code'
        uses: actions/checkout@v3
        
      - name: 'Cache Maven dependencies'
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ github.repository }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ github.repository }}-maven-

      - name: 'Set up JDK 11'
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: 'Generate Frontend .env File Dynamically'
        shell: bash
        run: |
          # Determine target file based on the active profile identifier
          TARGET_FILE="src/main/frontend/.env.${{ env.FINAL_PROFILE }}"
          
          echo "Creating runtime parameters file at: $TARGET_FILE"
          
          # Write values in the exact format required by your React package.json layout
          echo "REACT_APP_BASE_URL=${{ vars.APP_URL }}" > "$TARGET_FILE"
          echo "REACT_APP_ENV=${{ env.FINAL_PROFILE }}" >> "$TARGET_FILE"
          
          echo "--- Verification Check ---"
          cat "$TARGET_FILE"

      - name: 'Build with Maven'
        run: mvn clean package -DskipTests -P${{ env.FINAL_PROFILE }}

      - name: 'Login to Docker Hub'
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PAT }}

      - name: 'Build and Push Container Image'
        id: get_project
        shell: bash
        run: |
          set -e
          PROJECT_NAME=$(basename "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')
          IMAGE_NAME="docker.io/${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPOSITORY_NAME }}:${{ github.run_id }}"
      
          docker build -t "$IMAGE_NAME" .
          docker push "$IMAGE_NAME"

          echo "project_name=$PROJECT_NAME" >> $GITHUB_OUTPUT

  # ==============================================================================
  # DEPLOY JOB
  # ==============================================================================
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'prod' || 'test' }}
    env:
      DEPLOY_ENV: ${{ github.ref_name == 'main' && 'prod' || 'test' }}
      PROJECT_NAME: ${{ needs.build.outputs.project_name }}
      
    steps:
      - name: 'Load SSH Key'
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ONPREM_SERVER_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: 'Checkout Shared Scripts'
        uses: actions/checkout@v3
        with:
          repository: vs47096/Shared-OnPrem-Workflow
          path: devops-scripts
          token: ${{ github.token }}
          
      - name: 'Install Cloudflare CLI'
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb

      - name: 'Configure Cloudflare SSH Tunnel Proxy'
        run: |
          cat <<EOF >> ~/.ssh/config
          Host ${{ secrets.ONPREM_SERVER_SSH_HOST }}
            Port ${{ secrets.ONPREM_SERVER_SSH_PORT }}
            ProxyCommand cloudflared access ssh --hostname %h
            IdentityFile ~/.ssh/id_rsa
          EOF

      - name: 'Set container names'
        run: |
          PROJECT_NAME_LOWER="${{ env.PROJECT_NAME }}"
          DEPLOY_ENV_LOWER=$(echo "${{ env.DEPLOY_ENV }}" | tr '[:upper:]' '[:lower:]')
          if [ "${DEPLOY_ENV_LOWER}" = "prod" ]; then
            echo "CONTAINER_NAME=${PROJECT_NAME_LOWER}" >> $GITHUB_ENV
            echo "OLD_CONTAINER_NAME=${PROJECT_NAME_LOWER}_old" >> $GITHUB_ENV
          else
            echo "CONTAINER_NAME=${PROJECT_NAME_LOWER}-${DEPLOY_ENV_LOWER}" >> $GITHUB_ENV
            echo "OLD_CONTAINER_NAME=${PROJECT_NAME_LOWER}-${DEPLOY_ENV_LOWER}_old" >> $GITHUB_ENV
          fi
          
          echo "SSH_CMD=ssh -o StrictHostKeyChecking=no -p ${{ secrets.ONPREM_SERVER_SSH_PORT }} ${{ secrets.ONPREM_SERVER_USER_ADMIN }}@${{ secrets.ONPREM_SERVER_SSH_HOST }}" >> $GITHUB_ENV
          echo "SCP_CMD=scp -o StrictHostKeyChecking=no -P ${{ secrets.ONPREM_SERVER_SSH_PORT }}" >> $GITHUB_ENV
      
      - name: 'Upload Script Assets to Windows Server'
        run: |
          $SCP_CMD devops-scripts/scripts/*.bat ${{ secrets.ONPREM_SERVER_USER_ADMIN }}@${{ secrets.ONPREM_SERVER_SSH_HOST }}:C:/Windows/Temp/

      - name: 'Create Docker Auth Config'
        run: |
          AUTH=$(echo -n "${{ secrets.DOCKER_USERNAME }}:${{ secrets.DOCKER_PAT }}" | base64 -w0)
      
          cat > docker-config.json << EOF
          {
            "auths": {
              "https://index.docker.io/v1/": {
                "auth": "$AUTH"
              }
            }
          }
          EOF

      - name: 'Upload Docker Config'
        run: |
          $SCP_CMD docker-config.json \
            ${{ secrets.ONPREM_SERVER_USER_ADMIN }}@${{ secrets.ONPREM_SERVER_SSH_HOST }}:C:/Windows/Temp/config.json
            
          
      - name: 'Pull & Tag Remote Image'
        run: |
          # FIX: Changed from :latest to :${{ github.run_id }}
          REMOTE_IMAGE="docker.io/${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPOSITORY_NAME }}:${{ github.run_id }}"
          TAG_NAME="${{ env.CONTAINER_NAME }}:${{ github.run_id }}"
          
          # We pass the isolated custom config file directly to the pull engine to bypass Windows Session locks
          $SSH_CMD "cmd /c \"docker --config C:\Windows\Temp pull $REMOTE_IMAGE && docker tag $REMOTE_IMAGE $TAG_NAME\""
      
      - name: 'Isolate Pre-existing Container'
        run: |
          # Step A: Safe-rename the old running container to '_old' to unlock the active name slot
          $SSH_CMD "cmd /c \"docker rename ${{ env.CONTAINER_NAME }} ${{ env.OLD_CONTAINER_NAME }} || echo No old active instance found to rename\""

      - name: 'Launch Active Container'
        run: |
            # Step B: Free up the target port mapping by stopping the old container right before booting the new layer
            $SSH_CMD "cmd /c \"docker stop ${{ env.OLD_CONTAINER_NAME }} || echo No active container to stop\""
            
            # Step C: Spin up your third script passing along the unique runtime version ID argument
            # FIX: Explicitly wrapped parameters in escaped double quotes
            $SSH_CMD "cmd /c \"set ONPREM_SERVER_DB_HOST=${{ secrets.ONPREM_SERVER_DB_HOST }} && set ONPREM_SERVER_DB_USERNAME=${{ secrets.ONPREM_SERVER_DB_USERNAME }} && set ONPREM_SERVER_DB_PASSWORD=${{ secrets.ONPREM_SERVER_DB_PASSWORD }} && set APP_JWT_SECRET=${{ secrets.APP_JWT_SECRET }} && set DEPLOY_ENV=${{ env.DEPLOY_ENV }} && C:\Windows\Temp\3-run-container.bat \"${{ env.CONTAINER_NAME }}\" \"${{ vars.PORT }}\" \"${{ github.run_id }}\"\""
      
      - name: 'Health Check (Local via SSH)'
        id: check
        run: |
          # We call the uploaded batch file natively over our SSH command context
          $SSH_CMD "cmd /c \"C:\Windows\Temp\6-health-check.bat ${{ vars.PORT }} ${{ env.CONTAINER_NAME }}\""
          # SUCCESS POST-ACTION: Clear old assets ONLY if health checks return 200 OK
      
      - name: 'Commit Successful Deployment & Purge Old Assets'
        if: success()
        run: |
          $SSH_CMD "cmd /c \"docker rm -f ${{ env.OLD_CONTAINER_NAME }} || echo Old container already removed\""
          $SSH_CMD "cmd /c \"docker image prune -a -f\""

      # FAILURE AUTOMATIC ROLLBACK: If health check drops, bring the old version back online instantly
      - name: 'Execute Automatic Rollback to Previous Layer'
        if: failure() && steps.check.outcome == 'failure'
        run: |
          echo "[CRITICAL WARNING] Health Check failed! Initiating rollback to secure environment states..."
          
          # 1. Kill and remove the broken new version to clear the port namespace
          $SSH_CMD "cmd /c \"docker stop ${{ env.CONTAINER_NAME }} && docker rm -f ${{ env.CONTAINER_NAME }} || echo Cleanup bypass context\""
    
          # 2. Smart Rollback: Only attempt to restore the old container if it exists on disk
          $SSH_CMD "cmd /c \"docker inspect ${{ env.CONTAINER_NAME }}_old >nul 2>&1 && (echo [ROLLBACK] Restoring previous operational container... && docker start ${{ env.CONTAINER_NAME }}_old && docker rename ${{ env.CONTAINER_NAME }}_old ${{ env.CONTAINER_NAME }}) || (echo [NOTICE] No historical backup container exists to roll back to.)\""
            
      - name: 'Post-Deployment Server Cleanup'
        if: always()
        run: |
          $SSH_CMD "cmd /c \"C:\Windows\Temp\4-cleanup.bat && del C:\Windows\Temp\*.bat\""
  
  # ==============================================================================
  # CLEANUP JOB
  # ==============================================================================
  cleanup:
    runs-on: ubuntu-latest
    if: always()
    needs: [build, deploy]
    steps:
      - name: 'Checkout Shared Scripts'
        uses: actions/checkout@v3
        with:
          repository: vs47096/Shared-OnPrem-Workflow
          path: devops-scripts
          token: ${{ github.token }}

      - name: 'Execute Docker Hub Purge Script'
        run: |
          chmod +x devops-scripts/scripts/5-dockerhub-cleanup.sh
          
          ./devops-scripts/scripts/5-dockerhub-cleanup.sh \
            "${{ secrets.DOCKER_USERNAME }}" \
            "${{ secrets.DOCKER_PAT }}" \
            "${{ secrets.DOCKER_REPOSITORY_NAME }}"
